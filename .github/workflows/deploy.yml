name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/isaacwallace123/portfolio-frontend
  INFRA_IMAGE: ghcr.io/isaacwallace123/portfolio-infra

jobs:
  # ── Detect which parts of the repo changed ────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'

  # ── Build images in parallel, only when relevant files changed ────────────
  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            SESSION_PASSWORD=${{ secrets.SESSION_PASSWORD }}
            HASH_ENCRYPTION_KEY=${{ secrets.HASH_ENCRYPTION_KEY }}
            ADMIN_PASSWORD_HASH_ENCRYPTED=${{ secrets.ADMIN_PASSWORD_HASH_ENCRYPTED }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  build-infra:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.INFRA_IMAGE }}:latest
            ${{ env.INFRA_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  # ── Deploy: runs even when one or both builds were skipped ─────────────────
  deploy:
    runs-on: self-hosted
    needs: [build-frontend, build-infra]
    if: always() && !failure() && !cancelled()

    steps:
      - name: Restart frontend deployment
        run: kubectl rollout restart deployment/frontend -n portfolio

      - name: Restart infra-agent deployment
        run: kubectl rollout restart deployment/infra-agent -n portfolio

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/frontend -n portfolio --timeout=300s
          kubectl rollout status deployment/infra-agent -n portfolio --timeout=120s

      - name: Debug on failure
        if: failure()
        run: |
          kubectl get pods -n portfolio
          kubectl describe deployment frontend -n portfolio
          kubectl logs -l app=frontend -n portfolio --tail=100 || true
          kubectl logs -l app=infra-agent -n portfolio --tail=100 || true
